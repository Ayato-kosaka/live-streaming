<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>達成状況ドーナツ</title>
    <style>
      /* =========================
         ベースリセット
      ========================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #111827;
        /* 添付画像の薄いオレンジ寄り（ベース背景） */
        background: var(--bg-base);
      }

      /* =========================
         テーマカラー（必要ならここだけ調整）
      ========================== */
      :root {
        /* 背景の薄オレンジ（添付画像っぽい） */
        --bg-base: #fff1df;

        /* ポイントカラー：オレンジ寄りの赤（添付画像っぽい） */
        --accent: #f05a3a;

        /* 読みやすさ用 */
        --text: #111827;
        --text-sub: #374151;
        --text-muted: #6b7280;

        /* ドーナツ背景 */
        --donut-bg: #e5e7eb;
      }

      /* =========================
         背景画像を載せるコンテナ
         - 画像が読み込まれるまではベース色のまま
         - 読み込み完了後、background-image を付与
      ========================== */
      #pageRoot {
        align-items: center;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 24px 12px;
        background-color: var(--bg-base);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }

      /* 背景の上に載せるカード（読みやすさを確保） */
      .panel {
        width: min(92vw, 520px);
        border-radius: 28px;
        /* 背景がうるさい画像でも読めるように */
        background: rgba(255, 241, 223, 0.78);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        padding: 20px 18px 22px;
        box-shadow: 0 8px 30px rgba(17, 24, 39, 0.12);
      }

      /* =========================
         ドーナツ
      ========================== */
      .donut-wrapper {
        position: relative;
        width: min(86vw, 440px);
        height: min(86vw, 440px);
        margin: 0 auto;
        display: grid;
        place-items: center;
      }

      .donut-svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }

      .donut-bg {
        fill: none;
        stroke: var(--donut-bg);
        stroke-width: 16;
      }

      .donut-progress {
        fill: none;
        stroke: var(--accent);
        stroke-width: 16;
        stroke-linecap: round;
        transition: stroke 0.2s ease-out;
      }

      .center-text {
        position: absolute;
        text-align: center;
        pointer-events: none;
        padding: 0 8px;
      }

      .center-text-main {
        font-size: clamp(18px, 4vw, 28px);
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .center-text-value {
        font-size: clamp(28px, 10vw, 54px);
        font-weight: 800;
        margin: 6px 0 2px;
        color: var(--accent);
      }

      .center-text-sub {
        font-size: clamp(14px, 3.6vw, 18px);
        color: var(--text-sub);
        line-height: 1.45;
      }

      .center-text-status {
        font-size: clamp(12px, 3vw, 14px);
        color: var(--text-muted);
        margin-top: 10px;
      }

      .center-text-error {
        color: #ef4444;
        font-weight: 600;
      }

      /* 補足：下部のヘルプ */
      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .hint code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
      }

      /* =========================
         アクセシビリティ：動きを減らす設定
      ========================== */
      @media (prefers-reduced-motion: reduce) {
        .donut-progress {
          transition: none;
        }
      }
    </style>
  </head>

  <body>
    <!--
      .page に background-image を適用します（読み込み完了後）。
      それまでは --bg-base のみで表示されます。
    -->
    <main class="page" id="pageRoot">
      <section class="panel" aria-label="達成状況">
        <div class="donut-wrapper" aria-live="polite">
          <svg class="donut-svg" viewBox="0 0 200 200" aria-hidden="true">
            <circle class="donut-bg" cx="100" cy="100" r="80"></circle>
            <circle class="donut-progress" cx="100" cy="100" r="80"></circle>
          </svg>

          <div class="center-text">
            <div class="center-text-main">達成数</div>
            <div class="center-text-value" id="achievedCount">0</div>

            <div class="center-text-sub">
              目標数: <span id="targetCount">0</span><br />
              達成率: <span id="percentLabel">0</span>%
            </div>

            <!-- 背景画像ロードなどの状態表示 -->
            <div class="center-text-status" id="statusText">読み込み中…</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      "use strict";

      /* =========================================================
         ユーティリティ：URLクエリ取得
         - 例: ?achieved=10&target=20&bg=https%3A%2F%2F...
      ========================================================== */
      function getQueryParams() {
        const params = new URLSearchParams(window.location.search);

        // 数値は安全にパース（不正なら 0）
        const achieved = parseNonNegativeInt(params.get("achieved"));
        const target = parseNonNegativeInt(params.get("target"));

        // 背景画像URL（空文字なら未指定扱い）
        const bg = (params.get("bg") || "").trim();

        return { achieved, target, bg };
      }

      function parseNonNegativeInt(value) {
        // null/空/数字以外を弾き、0以上の整数のみ許可
        const n = Number(value);
        if (!Number.isFinite(n)) return 0;
        const int = Math.floor(n);
        return int < 0 ? 0 : int;
      }

      /* =========================================================
         背景画像：読み込み完了を待つ
         - background-image は CSS だけだと onload を取れないので、
           Image() でプリロードしてから適用する
         - タイムアウトでハング防止
      ========================================================== */
      function preloadImage(url, timeoutMs = 10000) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          let finished = false;

          const done = (ok, err) => {
            if (finished) return;
            finished = true;
            ok ? resolve(url) : reject(err || new Error("Image load failed"));
          };

          img.onload = () => done(true);
          img.onerror = () => done(false, new Error("Image load error"));

          // タイムアウト（画像サーバ不調などでもUIが固まらない）
          const timer = window.setTimeout(() => {
            done(false, new Error("Image load timeout"));
          }, timeoutMs);

          // どちらかが先に走ったらタイマーを止める
          const clear = () => window.clearTimeout(timer);
          img.onload = () => {
            clear();
            done(true);
          };
          img.onerror = () => {
            clear();
            done(false, new Error("Image load error"));
          };

          img.src = url;
        });
      }

      function applyBackgroundImage(el, url) {
        // 安全のため URL をそのまま CSS に入れるのではなく、
        // 文字列として url("...") 形式にする
        el.style.backgroundImage = `url("${url}")`;
      }

      /* =========================================================
         ドーナツ描画・アニメーション
      ========================================================== */
      const pageRootEl = document.getElementById("pageRoot");
      const achievedEl = document.getElementById("achievedCount");
      const targetEl = document.getElementById("targetCount");
      const percentLabelEl = document.getElementById("percentLabel");
      const statusTextEl = document.getElementById("statusText");
      const progressCircle = document.querySelector(".donut-progress");

      const radius = 80;
      const circumference = 2 * Math.PI * radius;

      progressCircle.style.strokeDasharray = `${circumference}`;
      progressCircle.style.strokeDashoffset = `${circumference}`;

      // prefers-reduced-motion の場合、アニメーションを控える
      const prefersReducedMotion =
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function clamp(n, min, max) {
        return Math.min(max, Math.max(min, n));
      }

      function computePercent(achieved, target) {
        // 目標0の場合は 0% 扱い（0除算回避）
        if (target <= 0) return 0;
        const raw = (achieved / target) * 100;
        // 達成率は 0〜100 に丸める（超過は100%表示）
        return clamp(Math.round(raw), 0, 100);
      }

      function setDonutByPercent(percent) {
        const offset = circumference * (1 - percent / 100);
        progressCircle.style.strokeDashoffset = `${offset}`;
      }

      function animateNumbersAndDonut(achieved, target) {
        const percent = computePercent(achieved, target);

        // 目標数は固定で表示
        targetEl.textContent = String(target);

        // 動きを減らす設定なら、即時反映
        if (prefersReducedMotion) {
          achievedEl.textContent = String(achieved);
          percentLabelEl.textContent = String(percent);
          setDonutByPercent(percent);
          return;
        }

        // 既存の requestAnimationFrame アニメ
        const durationMs = 900;
        let start = null;

        function step(ts) {
          if (start == null) start = ts;
          const t = clamp((ts - start) / durationMs, 0, 1);

          // 緩やかなイージング（easeOutQuad）
          const ease = 1 - (1 - t) * (1 - t);

          const currentAchieved = Math.floor(achieved * ease);
          const currentPercent = Math.floor(percent * ease);

          achievedEl.textContent = String(currentAchieved);
          percentLabelEl.textContent = String(currentPercent);
          setDonutByPercent(currentPercent);

          if (t < 1) requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
      }

      /* =========================================================
         初期化フロー
         1) URLクエリ読む
         2) 背景画像があればプリロードして適用
         3) 数字 & ドーナツを描画
      ========================================================== */
      async function init() {
        const { achieved, target, bg } = getQueryParams();

        // まず数値描画の前に、ステータス文言を適切に
        // bg があれば「背景画像読み込み中…」、なければ「表示中」
        if (bg) {
          statusTextEl.textContent = "背景画像読み込み中…";
        } else {
          statusTextEl.textContent = "表示中";
          // 背景画像がない場合はすぐ消してOK（お好みで）
          statusTextEl.style.display = "none";
        }

        // 背景画像が指定されている場合のみロード
        if (bg) {
          try {
            // ここで背景画像の読み込み完了を待つ
            await preloadImage(bg, 12000);

            // 読み込み成功したら cover 背景として適用
            applyBackgroundImage(pageRootEl, bg);

            // 状態表示を消す
            statusTextEl.style.display = "none";
          } catch (err) {
            // 失敗しても UI は継続：ベース背景色のまま
            console.warn("背景画像の読み込みに失敗:", err);
            statusTextEl.textContent =
              "背景画像の読み込みに失敗しました（背景色で表示中）";
            statusTextEl.classList.add("center-text-error");
            // 数秒後に消しても良い（今回は表示のまま）
          }
        }

        // 数字＆ドーナツを描画（超過は達成率だけ100%にクランプ）
        animateNumbersAndDonut(achieved, target);
      }

      // DOM 準備ができてから起動（安定）
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    </script>
  </body>
</html>
