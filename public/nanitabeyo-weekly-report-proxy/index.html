<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>なに食べよ週次ログレポート Proxy</title>
  <style>
    body {
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    code,
    pre {
      background: #f3f4f6;
      border-radius: 6px;
    }

    code {
      padding: 2px 6px;
    }

    pre {
      overflow: auto;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      font-weight: 700;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>なに食べよ週次ログレポート Proxy</h1>
  <p>
    Query string を Apps Script endpoint に転送し、取得した JSON をこのページに表示します。
  </p>
  <p>
    例:
    <code>?endpoint=weekly_manifest&amp;timezone=Asia/Tokyo</code>
  </p>
  <p class="status" id="status">Loading...</p>
  <pre id="output"></pre>

  <script>
    const appsScriptUrl = "https://script.google.com/macros/s/AKfycbz0RvIKLuuRBCktb8m7RKGk0dD0mzo6DhYFt_32zIMnqWnsLzypvZ99OZY95wQTVtW1/exec";
    const allowedEndpoints = new Set([
      "weekly_manifest",
      "weekly_overview",
      "weekly_product_kpis",
      "weekly_search",
      "weekly_topics",
      "weekly_dish_media",
      "weekly_reviews_feedback",
      "weekly_errors",
      "weekly_external_api",
      "weekly_versions",
    ]);
    const allowedParams = new Set([
      "endpoint",
      "week_start",
      "timezone",
      "start_at",
      "end_at",
      "days",
      "limit",
    ]);

    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");

    async function main() {
      const inputParams = new URLSearchParams(window.location.search);
      const endpoint = inputParams.get("endpoint") || "weekly_manifest";

      if (!allowedEndpoints.has(endpoint)) {
        render({ error: "Invalid endpoint", endpoint, allowed_endpoints: Array.from(allowedEndpoints) }, true);
        return;
      }

      const upstreamParams = new URLSearchParams();
      for (const [key, value] of inputParams.entries()) {
        if (allowedParams.has(key)) upstreamParams.set(key, value);
      }
      upstreamParams.set("endpoint", endpoint);
      if (!upstreamParams.has("timezone")) upstreamParams.set("timezone", "Asia/Tokyo");

      const upstreamUrl = `${appsScriptUrl}?${upstreamParams.toString()}`;

      try {
        const response = await fetch(upstreamUrl, { method: "GET" });
        const text = await response.text();
        let body;
        try {
          body = JSON.parse(text);
        } catch (_error) {
          body = { raw_response: text };
        }

        render({
          proxy_endpoint: endpoint,
          upstream_url: upstreamUrl,
          upstream_status: response.status,
          body,
        }, !response.ok);
      } catch (error) {
        render({
          error: "Failed to fetch upstream endpoint",
          message: error instanceof Error ? error.message : String(error),
        }, true);
      }
    }

    function render(value, isError) {
      statusEl.textContent = isError ? "Error" : "OK";
      outputEl.textContent = JSON.stringify(value, null, 2);
      document.title = `${statusEl.textContent}: なに食べよ週次ログレポート Proxy`;
    }

    main();
  </script>
</body>
</html>
