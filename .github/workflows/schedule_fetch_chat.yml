name: Fetch YouTube Chat Data

on:
  schedule:
    - cron: "0 20 * * *" # UTC 8:00 PM (日本時間 5:00)
  workflow_dispatch: # 手動実行も可能
    inputs:
      lookback_days:
        description: "Discovery lookback days（何日前まで検索するか）"
        required: false
        default: "10"
        type: string

# 同時実行を防止（単一実行前提）
concurrency:
  group: fetch-chat-${{ github.ref }}
  cancel-in-progress: false # 実行中を殺さず、次の起動を待たせる

jobs:
  discover_videos:
    runs-on: ubuntu-latest
    env:
      # BigQuery 設定
      BQ_PROJECT_ID: ${{ vars.BQ_PROJECT_ID || secrets.BQ_PROJECT_ID }}
      # YouTube API 設定
      YOUTUBE_API_KEY: ${{ secrets.EXPO_PUBLIC_YOUTUBE_API_KEY }}
      YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
      # Discovery 設定
      DISCOVERY_LOOKBACK_DAYS: ${{ inputs.lookback_days || '10' }}
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 環境のセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Google Cloud 認証
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 必要なパッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Discovery 実行
        run: python python/discover_videos.py

  fetch_chat_data:
    runs-on: ubuntu-latest
    needs: discover_videos # Discovery が成功した場合のみ実行
    env:
      # BigQuery 設定
      BQ_PROJECT_ID: ${{ vars.BQ_PROJECT_ID || secrets.BQ_PROJECT_ID }}
      # 旧環境変数（後方互換性のため保持、将来削除予定）
      PYTHON_GAS_API_URL: ${{ secrets.PYTHON_GAS_API_URL }}
      PYTHON_GAS_API_PW: ${{ secrets.PYTHON_GAS_API_PW }}
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 環境のセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Google Cloud 認証
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 必要なパッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }} # https://github.com/marketplace/actions/setup-yt-dlp#youtube-cookies

      - name: チャットデータ取得スクリプトの実行
        run: python python/fetch_chat_data.py

      - name: Update yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies/update@v3
        with:
          cookies_secret_name: YOUTUBE_COOKIES
          token: ${{ secrets.GH_PAT }}
